<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HabiCat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" />
<style>
  :root {
    --bg: #f7f3ec;
    --bg-2: #f1ebe1;
    --card: #ffffff;
    --border: #ece4d8;
    --text: #2c2a25;
    --muted: #8c8377;
    --accent: #2f9e6e;
    --accent-d: #268a5f;
    --accent-soft: #e3f3ea;
    --coral: #f2674f;
    --danger: #d64541;
    --danger-soft: #fbe9e7;
    --radius: 16px;
    --shadow-sm: 0 1px 2px rgba(74, 60, 42, .05);
    --shadow: 0 2px 8px rgba(74, 60, 42, .05), 0 18px 36px -22px rgba(74, 60, 42, .35);
    --font-body: "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-display: "Fredoka", ui-rounded, "Segoe UI", system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .container {
    max-width: 880px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }

  /* Header */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin: 4px 2px 26px;
  }
  .brand { display: flex; align-items: center; gap: 13px; }
  .brand .logo {
    width: 54px; height: 54px;
    border-radius: 15px;
    box-shadow: 0 3px 9px rgba(74, 60, 42, .14), 0 1px 2px rgba(74, 60, 42, .08);
    flex-shrink: 0;
    display: block;
  }
  .brand h1 {
    font-family: var(--font-display);
    font-size: 44px;
    font-weight: 700;
    letter-spacing: 0;
    line-height: 1;
    margin: 0;
  }
  .today-stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 9px 16px;
    box-shadow: var(--shadow);
    text-align: right;
    flex-shrink: 0;
  }
  .today-stat .label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: .07em;
    font-weight: 700;
    color: var(--muted);
  }
  .today-stat .value {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.15;
    font-variant-numeric: tabular-nums;
  }
  .today-stat .value span {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-left: 3px;
  }

  h2 {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    margin: 0 0 18px;
    color: var(--text);
    letter-spacing: .01em;
  }

  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
  }
  .section-head h2 { margin: 0; }
  .btn:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 7px;
  }

  .field { margin-bottom: 18px; }

  .optional-note { color: var(--muted); font-weight: 400; }

  input[type="text"],
  input[type="number"],
  input[type="date"],
  input[type="time"] {
    width: 100%;
    padding: 11px 13px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    background: #fffdfb;
    color: var(--text);
    transition: border-color .12s, box-shadow .12s;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  /* What autocomplete */
  .autocomplete-wrap { position: relative; }
  .autocomplete {
    list-style: none;
    margin: 6px 0 0;
    padding: 5px;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    z-index: 30;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    max-height: 240px;
    overflow-y: auto;
  }
  .ac-item {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    padding: 9px 11px;
    border-radius: 9px;
    cursor: pointer;
  }
  .ac-item:hover, .ac-item.active { background: var(--accent-soft); }
  .ac-name { font-weight: 600; color: var(--text); }
  .ac-hint { font-size: 12.5px; color: var(--muted); white-space: nowrap; }

  /* Segmented control */
  .segmented {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }
  .segmented input { position: absolute; opacity: 0; pointer-events: none; }
  .segmented label {
    margin: 0;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-weight: 500;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    user-select: none;
    background: #fffdfb;
    /* soft raised resting state */
    box-shadow: 0 1px 2px rgba(74, 60, 42, .06);
    transition: background .14s, border-color .14s, color .14s, box-shadow .14s, transform .12s;
  }
  .segmented label:hover { border-color: var(--accent); color: var(--accent-d); }
  .segmented label:active { transform: translateY(1px); }
  /* selected = pressed in: interior shade + nudged down, no outer lift */
  .segmented input:checked + label {
    background: var(--accent);
    border-color: var(--accent-d);
    color: #fff;
    transform: translateY(1px);
    box-shadow: inset 0 2px 5px rgba(17, 64, 43, .55), inset 0 -1px 0 rgba(255, 255, 255, .12);
  }
  .segmented input:focus-visible + label {
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  /* Self-assessment slider */
  .slider-field { --self-color: var(--self-grey, #b8b0a4); }
  .slider-readout {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    color: var(--self-color);
    margin-bottom: 8px;
    transition: color .15s;
  }
  #self-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 9px;
    border-radius: 999px;
    background: #e7e0d4;          /* JS overrides with a coloured fill */
    outline: none;
    cursor: pointer;
    margin: 2px 0;
  }
  #self-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--self-color);
    border: 3px solid #fff;
    box-shadow: 0 1px 4px rgba(40, 30, 20, .3), inset 0 2px 3px rgba(255, 255, 255, .35);
    transition: background .15s;
  }
  #self-slider::-moz-range-thumb {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--self-color);
    border: 3px solid #fff;
    box-shadow: 0 1px 4px rgba(40, 30, 20, .3);
  }
  #self-slider:focus-visible { box-shadow: 0 0 0 3px var(--accent-soft); }
  .slider-ticks {
    display: flex;
    justify-content: space-between;
    margin-top: 7px;
  }
  .slider-ticks span {
    font-size: 12px;
    color: var(--muted);
    flex: 1;
    text-align: center;
    transition: color .15s, font-weight .15s;
  }
  .slider-ticks span:first-child { text-align: left; }
  .slider-ticks span:last-child { text-align: right; }
  .slider-ticks span.active { color: var(--self-color); font-weight: 700; }
  .mini-clear {
    margin-left: 8px;
    border: none;
    background: none;
    color: var(--accent-d);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    padding: 0;
    text-transform: none;
  }
  .mini-clear:hover { text-decoration: underline; }

  /* Chart legend */
  .chart-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .chart-legend span {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }
  .chart-legend i {
    width: 12px; height: 12px;
    border-radius: 4px;
    display: inline-block;
  }
  .chart-notes {
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* Chart header: view toggle + day picker */
  .chart-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .chart-toggle {
    display: inline-flex;
    background: var(--bg-2);
    border-radius: 11px;
    padding: 3px;
    gap: 2px;
  }
  .chart-toggle button {
    border: none;
    background: none;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 14px;
    color: var(--muted);
    padding: 7px 14px;
    border-radius: 9px;
    cursor: pointer;
    transition: background .14s, color .14s;
  }
  .chart-toggle button.active { background: #fff; color: var(--accent-d); box-shadow: var(--shadow-sm); }

  .daypicker { position: relative; display: inline-flex; align-items: center; gap: 5px; }
  #day-btn { padding: 8px 14px; font-size: 14px; min-width: 96px; }
  #day-btn::after { content: " ▾"; color: var(--muted); }
  .day-nav {
    border: 1px solid var(--border);
    background: #fffdfb;
    color: var(--muted);
    width: 34px; height: 34px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 17px; line-height: 1;
    box-shadow: var(--shadow-sm);
    transition: border-color .12s, color .12s, background .12s;
  }
  .day-nav:hover:not(:disabled) { border-color: var(--accent); color: var(--accent-d); background: var(--accent-soft); }
  .day-nav:disabled { opacity: .4; cursor: not-allowed; }
  .day-pop {
    position: absolute;
    right: 0;
    top: calc(100% + 6px);
    z-index: 40;
    width: 264px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 12px;
  }
  .dp-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .dp-title { font-family: var(--font-display); font-weight: 600; font-size: 14px; }
  .dp-nav { border: none; background: none; cursor: pointer; font-size: 18px; line-height: 1; color: var(--muted); padding: 4px 9px; border-radius: 8px; }
  .dp-nav:hover { background: var(--accent-soft); color: var(--accent-d); }
  .dp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .dp-wd { text-align: center; font-size: 10.5px; color: var(--muted); font-weight: 700; padding: 2px 0; }
  .dp-day {
    position: relative;
    text-align: center;
    font-size: 13px;
    padding: 7px 0;
    border-radius: 8px;
    cursor: pointer;
    border: 1.5px solid transparent;
    font-variant-numeric: tabular-nums;
  }
  .dp-day:hover { background: var(--accent-soft); }
  .dp-day.empty { visibility: hidden; cursor: default; }
  .dp-day.logged::after {
    content: "";
    position: absolute;
    bottom: 3px; left: 50%;
    transform: translateX(-50%);
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }
  .dp-day.today { border-color: var(--accent); }
  .dp-day.selected { background: var(--accent); color: #fff; }
  .dp-day.selected.logged::after { background: #fff; }

  .row {
    display: flex;
    gap: 16px;
  }
  .row > .field { flex: 1; margin-bottom: 18px; }

  .quick {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 9px;
  }
  .quick button {
    padding: 5px 11px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: #fffdfb;
    color: var(--muted);
    border-radius: 999px;
    cursor: pointer;
    transition: border-color .12s, color .12s, background .12s, box-shadow .12s, transform .1s;
  }
  .quick button:hover { border-color: var(--accent); color: var(--accent-d); background: var(--accent-soft); }
  .quick button:active { transform: translateY(1px); box-shadow: inset 0 2px 4px rgba(74, 60, 42, .14); }

  .actions {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-top: 6px;
  }

  .btn {
    font-family: var(--font-display);
    padding: 11px 22px;
    border-radius: 13px;
    border: 1px solid transparent;
    font-size: 15.5px;
    font-weight: 600;
    letter-spacing: .01em;
    cursor: pointer;
    transition: background .14s, transform .08s, box-shadow .14s, color .14s, border-color .14s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 8px 18px -7px var(--accent);
  }
  .btn-primary:hover { background: var(--accent-d); transform: translateY(-1px); }
  .btn-primary:active {
    transform: translateY(1px);
    box-shadow: inset 0 3px 8px rgba(17, 64, 43, .55);
  }
  .btn-ghost { background: #fffdfb; color: var(--text); border-color: var(--border); box-shadow: var(--shadow-sm); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent-d); background: var(--accent-soft); }
  .btn-ghost:active {
    transform: translateY(1px);
    box-shadow: inset 0 2px 6px rgba(74, 60, 42, .18);
  }

  .error {
    color: var(--danger);
    font-size: 13px;
    margin-top: 12px;
    min-height: 0;
  }

  /* Chart */
  .chart-wrap { overflow-x: auto; }
  .chart-wrap svg { display: block; margin: 0 auto; }
  .bar-value { fill: var(--text); font-family: var(--font-display); font-size: 12.5px; font-weight: 600; text-anchor: middle; font-variant-numeric: tabular-nums; }
  .bar-meta { fill: var(--muted); font-family: var(--font-body); font-size: 10px; font-weight: 400; text-anchor: middle; font-variant-numeric: tabular-nums; }
  .axis-label { fill: var(--muted); font-size: 11px; text-anchor: middle; }
  .axis-label.today { fill: var(--text); font-weight: 700; }
  .axis-line { stroke: #efe7da; stroke-width: 1; }

  /* Table */
  .table-scroll { overflow-x: auto; margin: 0 -4px; }
  table { width: 100%; border-collapse: collapse; }
  th, td {
    text-align: left;
    padding: 11px 9px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  th:first-child, td:first-child { padding-left: 4px; }
  th:last-child, td:last-child { padding-right: 4px; }
  td.nowrap, th.nowrap { white-space: nowrap; }
  thead th { border-bottom-width: 1.5px; }
  th { color: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; white-space: nowrap; }
  tbody tr { transition: background .12s; }
  tbody tr:hover { background: #faf7f1; }
  tbody tr:last-child td { border-bottom: none; }
  td.what { font-weight: 600; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.muted-cell { color: var(--muted); }

  .tag {
    display: inline-block;
    padding: 3px 11px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent-d);
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    line-height: 1.45;
  }
  .tag-green  { background: #e3f3ea; color: #1f8a5b; }
  .tag-red    { background: #fbe7e4; color: #cc3f39; }
  .tag-amber  { background: #fbeed8; color: #b0710a; }
  .tag-lime   { background: #e8f4dc; color: #4f9a39; }
  .tag-slate  { background: #edeef1; color: #5d6b7a; }
  .tag-orange { background: #fce9d9; color: #bd6510; }
  .tag-teal   { background: #def2f0; color: #1c8a86; }
  .tag-purple { background: #f0e8fb; color: #7a4fce; }
  .tag-blue   { background: #e6eefc; color: #2f6fed; }

  .icon-btn {
    background: none;
    border: 1px solid transparent;
    padding: 5px 11px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--accent-d);
    border-radius: 8px;
    transition: background .12s, color .12s;
  }
  .icon-btn:hover { background: var(--accent-soft); }
  .icon-btn.danger { color: var(--danger); }
  .icon-btn.danger:hover { background: var(--danger-soft); }
  .table-actions { white-space: nowrap; }
  .table-actions button + button { margin-left: 4px; }

  .empty {
    color: var(--muted);
    text-align: center;
    padding: 34px 0;
    font-size: 14px;
  }

  .editing-banner {
    background: #fff5ea;
    color: #b0710a;
    border: 1px solid #f6e2c4;
    font-size: 13px;
    font-weight: 600;
    padding: 9px 13px;
    border-radius: 10px;
    margin-bottom: 18px;
  }
  .hidden { display: none; }

  @media (max-width: 560px) {
    .row { flex-direction: column; gap: 0; }
    .brand h1 { font-size: 30px; }
    .brand .logo { width: 46px; height: 46px; }
    .today-stat { padding: 7px 13px; }
    .today-stat .value { font-size: 18px; }
    .card { padding: 18px; }
  }
</style>
</head>
<body>
<div class="container">
  <header class="app-header">
    <div class="brand">
      <svg class="logo" viewBox="0 0 44 44" width="54" height="54" aria-hidden="true">
        <defs>
          <linearGradient id="pillowBg" x1="0.12" y1="0.08" x2="0.92" y2="1">
            <stop offset="0" stop-color="#ffffff" />
            <stop offset="1" stop-color="#e9e1d4" />
          </linearGradient>
          <radialGradient id="pillowHi" cx="0.3" cy="0.24" r="0.85">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0.95" />
            <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
          </radialGradient>
          <linearGradient id="catGrad" x1="0" y1="0" x2="0.9" y2="1">
            <stop offset="0" stop-color="#43b582" />
            <stop offset="1" stop-color="#247e58" />
          </linearGradient>
          <!-- inner "interior shade" matching the pressed-button look -->
          <filter id="catShade" x="-25%" y="-25%" width="150%" height="150%">
            <feOffset in="SourceAlpha" dx="0" dy="2" result="o" />
            <feGaussianBlur in="o" stdDeviation="1.6" result="b" />
            <feComposite in="b" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="d" />
            <feFlood flood-color="#11402b" flood-opacity="0.55" />
            <feComposite in2="d" operator="in" />
            <feComposite in2="SourceGraphic" operator="over" />
          </filter>
        </defs>
        <!-- pillowy white background -->
        <rect width="44" height="44" rx="13" fill="url(#pillowBg)" />
        <rect width="44" height="44" rx="13" fill="url(#pillowHi)" />
        <!-- cat head silhouette with pressed-in interior shade -->
        <path d="M13 18 L12.4 8.5 L19.6 15 Q22 13.8 24.4 15 L31.6 8.5 L31 18 Q33.2 22 31 26.6 Q28 32.6 22 33.2 Q16 32.6 13 26.6 Q10.8 22 13 18 Z"
              fill="url(#catGrad)" filter="url(#catShade)" />
      </svg>
      <h1>HabiCat</h1>
    </div>
    <div class="today-stat">
      <div class="label">Today</div>
      <div class="value" id="today-value">0<span>cal</span></div>
    </div>
  </header>

  <!-- 1. Entry form -->
  <section class="card">
    <h2>Add entry</h2>
    <div id="editing-banner" class="editing-banner hidden">Editing entry — make your changes and click Update.</div>
    <form id="entry-form" novalidate>
      <div class="field">
        <label for="what">What</label>
        <div class="autocomplete-wrap">
          <input type="text" id="what" placeholder="e.g. Chicken sandwich, Coffee, Pizza" autocomplete="off" role="combobox" aria-expanded="false" aria-controls="what-suggestions" aria-autocomplete="list" />
          <ul id="what-suggestions" class="autocomplete hidden" role="listbox"></ul>
        </div>
      </div>

      <div class="field">
        <label>Category</label>
        <div class="segmented" id="category-group"></div>
      </div>

      <div class="field">
        <label>Self assessment <span class="optional-note">(optional)</span>
          <button type="button" id="self-clear" class="mini-clear hidden">Clear</button>
        </label>
        <div class="slider-field" id="self-field">
          <div class="slider-readout" id="self-readout">Not rated</div>
          <input type="range" id="self-slider" min="0" max="3" step="1" value="0"
                 aria-label="Self assessment" aria-valuetext="Not rated" />
          <div class="slider-ticks" id="self-ticks">
            <span>Nasty</span><span>Okay</span><span>Healthy-ish</span><span>Healthy</span>
          </div>
        </div>
      </div>

      <div class="field">
        <label>Prep mode <span class="optional-note">(optional)</span></label>
        <div class="segmented" id="prep-group"></div>
      </div>

      <div class="row">
        <div class="field">
          <label for="date">Date</label>
          <input type="date" id="date" />
          <div class="quick">
            <button type="button" data-date="today">Today</button>
            <button type="button" data-date="yesterday">Yesterday</button>
          </div>
        </div>
        <div class="field">
          <label for="time">Time</label>
          <input type="time" id="time" />
          <div class="quick">
            <button type="button" data-time="0">Now</button>
            <button type="button" data-time="15">15 min ago</button>
            <button type="button" data-time="30">30 min ago</button>
            <button type="button" data-time="60">1 hour ago</button>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="calories">Estimated cals</label>
        <input type="number" id="calories" min="1" step="1" placeholder="e.g. 550" />
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-primary" id="save-btn">Save entry</button>
        <button type="button" class="btn btn-ghost hidden" id="cancel-btn">Cancel</button>
      </div>
      <div class="error" id="error" role="alert"></div>
    </form>
  </section>

  <!-- 2. Charts (toggle between views) -->
  <section class="card">
    <div class="chart-head">
      <div class="chart-toggle" id="chart-toggle">
        <button type="button" data-chart="day" class="active">Per day</button>
        <button type="button" data-chart="hour">Time of day</button>
      </div>
      <div class="daypicker hidden" id="daypicker">
        <button type="button" class="day-nav" id="day-prev" aria-label="Previous day">‹</button>
        <button type="button" class="btn btn-ghost" id="day-btn">Today</button>
        <button type="button" class="day-nav" id="day-next" aria-label="Next day">›</button>
        <div class="day-pop hidden" id="day-pop"></div>
      </div>
    </div>
    <div class="chart-wrap" id="chart"></div>
  </section>

  <!-- 3. Entries table -->
  <section class="card">
    <div class="section-head">
      <h2>Entries</h2>
      <button type="button" class="btn btn-ghost" id="export-btn">Export CSV</button>
    </div>
    <div id="table-wrap"></div>
  </section>
</div>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "calorie-entries";
  var CATEGORIES = ["Breakfast", "Lunch", "Dinner", "Beverage", "Snack"];
  // Self assessment is an ordinal scale (index 0..3 = ascending healthiness).
  var SELF_ASSESSMENTS = ["Nasty", "Okay", "Healthy-ish", "Healthy"];
  var SELF_COLORS = ["#d8473f", "#e3a81f", "#74c062", "#2f9e6e"]; // base (slider + past bars)
  var SELF_LIGHT = ["#ec8a82", "#f0d486", "#a3d997", "#66c39e"];  // lighter tone (today's bar)
  var SELF_GREY = "#b8b0a4";        // unrated (past)
  var SELF_GREY_LIGHT = "#d4ccbf";  // unrated (today)
  var PREP_MODES = ["Home cooked", "Fridge scraps", "Delivery", "Restaurant", "Meal Prep", "Pick-up", "Office", "Other"];

  // --- State ---
  var entries = loadEntries();
  var editingId = null; // null = creating, otherwise editing existing entry id

  // --- Element refs ---
  var form = document.getElementById("entry-form");
  var whatEl = document.getElementById("what");
  var categoryGroup = document.getElementById("category-group");
  var prepGroup = document.getElementById("prep-group");
  var selfField = document.getElementById("self-field");
  var selfSlider = document.getElementById("self-slider");
  var selfReadout = document.getElementById("self-readout");
  var selfClearBtn = document.getElementById("self-clear");
  var selfTicks = document.getElementById("self-ticks");
  var dateEl = document.getElementById("date");
  var timeEl = document.getElementById("time");
  var caloriesEl = document.getElementById("calories");
  var errorEl = document.getElementById("error");
  var saveBtn = document.getElementById("save-btn");
  var cancelBtn = document.getElementById("cancel-btn");
  var editingBanner = document.getElementById("editing-banner");
  var exportBtn = document.getElementById("export-btn");
  var suggestionsEl = document.getElementById("what-suggestions");
  var chartToggle = document.getElementById("chart-toggle");
  var daypicker = document.getElementById("daypicker");
  var dayBtn = document.getElementById("day-btn");
  var dayPop = document.getElementById("day-pop");
  var dayPrev = document.getElementById("day-prev");
  var dayNext = document.getElementById("day-next");

  // --- Chart view state ---
  var activeChart = "day";   // "day" | "hour"
  var selectedDay = null;    // ISO date for the time-of-day chart
  var pickerMonth = null;    // { y, m } currently shown in the calendar popover

  // --- Build segmented controls ---
  // optional=true lets the user clear the choice by tapping the selected option
  // again (plain radio buttons can't be unchecked otherwise).
  function buildSegmented(container, name, options, optional) {
    options.forEach(function (opt, i) {
      var id = name + "-" + i;
      var input = document.createElement("input");
      input.type = "radio";
      input.name = name;
      input.id = id;
      input.value = opt;
      var label = document.createElement("label");
      label.setAttribute("for", id);
      label.textContent = opt;
      container.appendChild(input);
      container.appendChild(label);

      if (optional) {
        input.addEventListener("click", function () {
          // At click time this radio is already checked. If it was already the
          // selected one before the click, clear the whole group instead.
          if (input.getAttribute("data-was-checked") === "1") {
            input.checked = false;
          }
          syncCheckedFlags(container);
        });
      }
    });
  }

  // Record current checked state so the optional click-to-clear logic can tell
  // whether a tapped option was already selected.
  function syncCheckedFlags(container) {
    container.querySelectorAll("input").forEach(function (inp) {
      inp.setAttribute("data-was-checked", inp.checked ? "1" : "0");
    });
  }

  buildSegmented(categoryGroup, "category", CATEGORIES, false);
  buildSegmented(prepGroup, "prepMode", PREP_MODES, true);

  // --- Self-assessment slider ---
  // Optional: starts "unrated" (grey) and only commits to a value once touched.
  var selfRated = false;

  function getSelfAssessment() {
    return selfRated ? SELF_ASSESSMENTS[+selfSlider.value] : "";
  }
  function setSelfAssessment(value) {
    var idx = SELF_ASSESSMENTS.indexOf(value);
    if (idx === -1) {
      selfRated = false;          // unknown or "" → unrated
    } else {
      selfRated = true;
      selfSlider.value = idx;
    }
    updateSelfVisuals();
  }
  function updateSelfVisuals() {
    var idx = +selfSlider.value;
    var color = selfRated ? SELF_COLORS[idx] : SELF_GREY;
    selfField.style.setProperty("--self-color", color);
    selfReadout.textContent = selfRated ? SELF_ASSESSMENTS[idx] : "Not rated";
    selfSlider.setAttribute("aria-valuetext", selfRated ? SELF_ASSESSMENTS[idx] : "Not rated");
    // Fill the track up to the thumb in the active colour (grey track when unrated).
    var pct = (idx / 3) * 100;
    selfSlider.style.background = selfRated
      ? "linear-gradient(to right, " + color + " 0%, " + color + " " + pct + "%, #e7e0d4 " + pct + "%, #e7e0d4 100%)"
      : "#e7e0d4";
    var tickEls = selfTicks.children;
    for (var i = 0; i < tickEls.length; i++) {
      tickEls[i].classList.toggle("active", selfRated && i === idx);
    }
    selfClearBtn.classList.toggle("hidden", !selfRated);
  }
  selfSlider.addEventListener("input", function () {
    selfRated = true;
    updateSelfVisuals();
  });
  selfClearBtn.addEventListener("click", function () {
    selfRated = false;
    selfSlider.value = 0;
    updateSelfVisuals();
  });

  // --- Persistence ---
  function loadEntries() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      var parsed = raw ? JSON.parse(raw) : [];
      if (!Array.isArray(parsed)) return [];
      return parsed.map(migrateEntry);
    } catch (e) {
      return [];
    }
  }

  // Bring entries saved before Self assessment / Prep mode existed up to date:
  // fold the old "Snack - healthy/nasty" categories into "Snack" + a matching
  // self assessment, and default the new fields to "".
  function migrateEntry(en) {
    en.selfAssessment = en.selfAssessment || "";
    en.prepMode = en.prepMode || "";
    if (en.category === "Snack - healthy") {
      en.category = "Snack";
      if (!en.selfAssessment) en.selfAssessment = "Healthy";
    } else if (en.category === "Snack - nasty") {
      en.category = "Snack";
      if (!en.selfAssessment) en.selfAssessment = "Nasty";
    }
    // Fold the old self-assessment options into the new ordinal scale.
    if (en.selfAssessment === "Healthy but high calorie") en.selfAssessment = "Healthy-ish";
    else if (en.selfAssessment === "Misc") en.selfAssessment = "";
    return en;
  }
  function saveEntries() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    } catch (e) {
      /* storage may be unavailable; app still works in-memory */
    }
  }

  // --- Datetime helpers (local time) ---
  var MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  function pad(n) { return n < 10 ? "0" + n : "" + n; }
  function dateStr(d) { return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); }
  function timeStr(d) { return pad(d.getHours()) + ":" + pad(d.getMinutes()); }
  function fmtNum(n) { return Number(n).toLocaleString("en-US"); } // 1000 -> "1,000"
  function timeToMin(t) { return (+t.slice(0, 2)) * 60 + (+t.slice(3, 5)); } // "hh:mm" -> minutes
  function prevDateStr(iso) { var d = new Date(iso + "T00:00:00"); d.setDate(d.getDate() - 1); return dateStr(d); }
  // Friendly, compact date for the table (e.g. "Jun 29"); adds the year only
  // when it isn't the current year. The stored ISO date is unchanged.
  function formatDateShort(iso) {
    var p = String(iso).split("-");
    if (p.length !== 3) return iso;
    var s = MONTHS[(+p[1]) - 1] + " " + (+p[2]);
    if (+p[0] !== new Date().getFullYear()) s += ", " + p[0];
    return s;
  }

  // --- Form helpers ---
  function getSelected(container) {
    var checked = container.querySelector("input:checked");
    return checked ? checked.value : "";
  }
  function setSelected(container, value) {
    container.querySelectorAll("input").forEach(function (inp) {
      inp.checked = inp.value === value;
    });
    syncCheckedFlags(container);
  }

  // Reset form to a clean "create" state, re-filling date/time with the
  // current local moment (recomputed every time this runs, not just on load).
  function resetForm() {
    editingId = null;
    var now = new Date();
    form.reset();
    whatEl.value = "";
    caloriesEl.value = "";
    setSelected(categoryGroup, "");
    setSelfAssessment("");
    setSelected(prepGroup, "");
    dateEl.value = dateStr(now);
    timeEl.value = timeStr(now);
    errorEl.textContent = "";
    saveBtn.textContent = "Save entry";
    cancelBtn.classList.add("hidden");
    editingBanner.classList.add("hidden");
    hideSuggestions();
  }

  function loadEntryIntoForm(entry) {
    editingId = entry.id;
    whatEl.value = entry.what;
    setSelected(categoryGroup, entry.category);
    setSelfAssessment(entry.selfAssessment || "");
    setSelected(prepGroup, entry.prepMode || "");
    dateEl.value = entry.date;
    timeEl.value = entry.time;
    caloriesEl.value = entry.estimatedCalories;
    errorEl.textContent = "";
    saveBtn.textContent = "Update entry";
    cancelBtn.classList.remove("hidden");
    editingBanner.classList.remove("hidden");
    whatEl.focus();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  // --- Validation ---
  // Returns { ok: true, value } or { ok: false, message }
  function validate() {
    var what = whatEl.value.trim();
    if (!what) return { ok: false, message: "Please enter what you ate or drank." };

    var category = getSelected(categoryGroup);
    if (CATEGORIES.indexOf(category) === -1) return { ok: false, message: "Please choose a category." };

    // Self assessment and prep mode are optional.
    var selfAssessment = getSelfAssessment();
    var prepMode = getSelected(prepGroup);

    var date = dateEl.value;
    if (!date || isNaN(new Date(date + "T00:00:00").getTime())) {
      return { ok: false, message: "Please enter a valid date." };
    }

    var time = timeEl.value;
    if (!/^\d{2}:\d{2}$/.test(time)) return { ok: false, message: "Please enter a valid time (HH:MM)." };

    var calories = Number(caloriesEl.value);
    if (!caloriesEl.value || isNaN(calories) || calories <= 0) {
      return { ok: false, message: "Estimated cals must be a positive number." };
    }

    return {
      ok: true,
      value: {
        what: what,
        category: category,
        selfAssessment: selfAssessment,
        prepMode: prepMode,
        date: date,
        time: time,
        estimatedCalories: Math.round(calories)
      }
    };
  }

  // --- Save / submit ---
  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var result = validate();
    if (!result.ok) {
      errorEl.textContent = result.message;
      return;
    }
    var v = result.value;
    var timestamp = v.date + "T" + v.time + ":00";

    if (editingId) {
      var existing = entries.find(function (en) { return en.id === editingId; });
      if (existing) {
        existing.what = v.what;
        existing.category = v.category;
        existing.selfAssessment = v.selfAssessment;
        existing.prepMode = v.prepMode;
        existing.date = v.date;
        existing.time = v.time;
        existing.estimatedCalories = v.estimatedCalories;
        existing.timestamp = timestamp;
      }
    } else {
      entries.push({
        id: (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random()),
        what: v.what,
        category: v.category,
        selfAssessment: v.selfAssessment,
        prepMode: v.prepMode,
        date: v.date,
        time: v.time,
        estimatedCalories: v.estimatedCalories,
        timestamp: timestamp
      });
    }
    saveEntries();
    render();
    resetForm();
  });

  cancelBtn.addEventListener("click", resetForm);

  // Quick date buttons
  document.querySelectorAll("[data-date]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var d = new Date();
      if (btn.getAttribute("data-date") === "yesterday") d.setDate(d.getDate() - 1);
      dateEl.value = dateStr(d);
    });
  });

  // Quick time buttons (minutes-ago, recomputed from the current moment)
  document.querySelectorAll("[data-time]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var mins = parseInt(btn.getAttribute("data-time"), 10);
      var d = new Date();
      d.setMinutes(d.getMinutes() - mins);
      timeEl.value = timeStr(d);
    });
  });

  // Entries sorted by timestamp, newest first (shared by table + CSV export).
  function sortedNewestFirst() {
    return entries.slice().sort(function (a, b) {
      return a.timestamp < b.timestamp ? 1 : a.timestamp > b.timestamp ? -1 : 0;
    });
  }

  // --- "What" autocomplete from past entries ---
  var acItems = [];      // records currently shown in the dropdown
  var acIndex = -1;      // highlighted item index (-1 = none)

  // One canonical record per distinct (case-insensitive) "what", keeping the
  // most recent by timestamp — that's the metadata a suggestion copies.
  function canonicalByWhat() {
    var map = {};
    entries.forEach(function (en) {
      var key = en.what.trim().toLowerCase();
      if (!key) return;
      if (!map[key] || en.timestamp > map[key].timestamp) map[key] = en;
    });
    return Object.keys(map).map(function (k) { return map[k]; });
  }

  function suggestionsFor(query) {
    var q = query.trim().toLowerCase();
    if (!q) return [];
    return canonicalByWhat()
      .filter(function (en) { return en.what.toLowerCase().indexOf(q) !== -1; })
      .sort(function (a, b) { return a.timestamp < b.timestamp ? 1 : a.timestamp > b.timestamp ? -1 : 0; })
      .slice(0, 6);
  }

  function hideSuggestions() {
    suggestionsEl.classList.add("hidden");
    suggestionsEl.innerHTML = "";
    whatEl.setAttribute("aria-expanded", "false");
    acItems = [];
    acIndex = -1;
  }

  function showSuggestions() {
    acItems = suggestionsFor(whatEl.value);
    acIndex = -1;
    if (acItems.length === 0) { hideSuggestions(); return; }
    suggestionsEl.innerHTML = acItems.map(function (en, i) {
      var hint = en.estimatedCalories + " cal · " + en.category;
      return '<li class="ac-item" role="option" data-i="' + i + '">' +
        '<span class="ac-name">' + escapeHtml(en.what) + '</span>' +
        '<span class="ac-hint">' + escapeHtml(hint) + '</span></li>';
    }).join("");
    suggestionsEl.classList.remove("hidden");
    whatEl.setAttribute("aria-expanded", "true");
  }

  // Copy a past entry's metadata + time into the form; date stays today.
  function applySuggestion(rec) {
    whatEl.value = rec.what;
    setSelected(categoryGroup, rec.category);
    setSelfAssessment(rec.selfAssessment || "");
    setSelected(prepGroup, rec.prepMode || "");
    caloriesEl.value = rec.estimatedCalories;
    timeEl.value = rec.time;
    dateEl.value = dateStr(new Date()); // keep the current day
    hideSuggestions();
    caloriesEl.focus();
  }

  function highlight(i) {
    var lis = suggestionsEl.querySelectorAll(".ac-item");
    lis.forEach(function (li) { li.classList.remove("active"); });
    if (i >= 0 && i < lis.length) {
      lis[i].classList.add("active");
      lis[i].scrollIntoView({ block: "nearest" });
    }
    acIndex = i;
  }

  whatEl.addEventListener("input", showSuggestions);
  whatEl.addEventListener("focus", function () { if (whatEl.value.trim()) showSuggestions(); });
  whatEl.addEventListener("keydown", function (e) {
    if (suggestionsEl.classList.contains("hidden") || acItems.length === 0) return;
    if (e.key === "ArrowDown") { e.preventDefault(); highlight((acIndex + 1) % acItems.length); }
    else if (e.key === "ArrowUp") { e.preventDefault(); highlight((acIndex - 1 + acItems.length) % acItems.length); }
    else if (e.key === "Enter") {
      if (acIndex >= 0) { e.preventDefault(); applySuggestion(acItems[acIndex]); }
    } else if (e.key === "Escape") { hideSuggestions(); }
  });
  // mousedown (not click) so it fires before the input's blur hides the list.
  suggestionsEl.addEventListener("mousedown", function (e) {
    var li = e.target.closest(".ac-item");
    if (!li) return;
    e.preventDefault();
    applySuggestion(acItems[+li.getAttribute("data-i")]);
  });
  document.addEventListener("click", function (e) {
    if (!e.target.closest(".autocomplete-wrap")) hideSuggestions();
  });

  // --- CSV export ---
  // Quote every field and double any embedded quotes so commas, quotes and
  // newlines inside values can't break the columns.
  function escapeCsv(value) {
    return '"' + String(value == null ? "" : value).replace(/"/g, '""') + '"';
  }

  function entriesToCsv() {
    var columns = ["What", "Category", "Self assessment", "Prep mode", "Date", "Time", "Estimated cals"];
    var lines = [columns.map(escapeCsv).join(",")];
    sortedNewestFirst().forEach(function (en) {
      lines.push([
        en.what,
        en.category,
        en.selfAssessment || "",
        en.prepMode || "",
        en.date,
        en.time,
        en.estimatedCalories
      ].map(escapeCsv).join(","));
    });
    return lines.join("\r\n");
  }

  function downloadCsv() {
    if (entries.length === 0) return;
    // Leading BOM so Excel reads UTF-8 (accented characters) correctly.
    var blob = new Blob(["﻿" + entriesToCsv()], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    var now = new Date();
    var stamp = dateStr(now) + "_" + pad(now.getHours()) + "-" + pad(now.getMinutes()) + "-" + pad(now.getSeconds());
    a.download = "data_furball_lol_" + stamp + ".csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  exportBtn.addEventListener("click", downloadCsv);

  // --- Rendering ---
  var todayValueEl = document.getElementById("today-value");

  function render() {
    renderChart();
    renderTable();
    renderTodayStat();
    exportBtn.disabled = entries.length === 0;
  }

  function renderTodayStat() {
    var today = dateStr(new Date());
    var total = entries.reduce(function (sum, en) {
      return en.date === today ? sum + en.estimatedCalories : sum;
    }, 0);
    todayValueEl.innerHTML = total + "<span>cal</span>";
  }

  // Parts of the day (by meal hour). "Night" wraps past midnight (21:00–04:59):
  // hours before 5 are treated as hour+24 so a 2am snack lands in Night.
  var DAY_PARTS = [
    { name: "Morning", start: 5, end: 11 },
    { name: "Midday", start: 11, end: 14 },
    { name: "Afternoon", start: 14, end: 17 },
    { name: "Evening", start: 17, end: 21 },
    { name: "Night", start: 21, end: 29 }
  ];
  function partIndexForHour(h) {
    var hh = h < 5 ? h + 24 : h;
    for (var i = 0; i < DAY_PARTS.length; i++) {
      if (hh >= DAY_PARTS[i].start && hh < DAY_PARTS[i].end) return i;
    }
    return DAY_PARTS.length - 1;
  }

  // --- Chart helpers (shared by both chart views) ---
  function byTimeAsc(a, b) { return a.timestamp < b.timestamp ? -1 : a.timestamp > b.timestamp ? 1 : 0; }
  function entryLevel(en) { return SELF_ASSESSMENTS.indexOf(en.selfAssessment); }
  function segColor(level, isToday) {
    if (level === -1) return isToday ? SELF_GREY_LIGHT : SELF_GREY;
    return isToday ? SELF_LIGHT[level] : SELF_COLORS[level];
  }
  function fmtHours(min) {
    var h = Math.round(min / 30) / 2; // nearest half-hour
    return (Number.isInteger(h) ? h : h.toFixed(1)) + "h";
  }
  // Path for a bar with only its top two corners rounded.
  function topRoundedRect(x, y, w, h, r) {
    r = Math.max(0, Math.min(r, h, w / 2));
    return "M" + x + "," + (y + h) +
      " L" + x + "," + (y + r) +
      " Q" + x + "," + y + " " + (x + r) + "," + y +
      " L" + (x + w - r) + "," + y +
      " Q" + (x + w) + "," + y + " " + (x + w) + "," + (y + r) +
      " L" + (x + w) + "," + (y + h) + " Z";
  }
  function colorLegend() {
    var legend = '<div class="chart-legend">';
    SELF_ASSESSMENTS.forEach(function (name, i) {
      legend += '<span><i style="background:' + SELF_COLORS[i] + '"></i>' + name + '</span>';
    });
    return legend + '<span><i style="background:' + SELF_GREY + '"></i>Not rated</span></div>';
  }

  // Generic stacked-bar renderer used by every chart view.
  // cols: [{ meals:[sorted entries], total, xlabel, today:bool, todayLabel:bool, sub:[strings] }]
  // opts: { barSlot, barW, ariaLabel, legend, notes }
  function drawStacked(chartEl, cols, opts) {
    var plotH = 210, barSlot, barW;
    var maxVal = 0, maxSub = 0;
    cols.forEach(function (c) {
      if (c.total > maxVal) maxVal = c.total;
      if (c.sub && c.sub.length > maxSub) maxSub = c.sub.length;
    });
    var totalGap = 8 + maxSub * 13;        // bar top → bold total
    var padTop = totalGap + 14, padBottom = 46, padLeft = 50, padRight = 16;
    var width;
    if (opts.fitWidth) {
      // Fill the container exactly (no horizontal scroll); bars share the space.
      width = Math.max(280, opts.fitWidth);
      barSlot = (width - padLeft - padRight) / cols.length;
      barW = Math.min(opts.barW || 38, barSlot * 0.62);
    } else {
      barSlot = opts.barSlot || 64;
      barW = opts.barW || 38;
      width = Math.max(320, padLeft + padRight + cols.length * barSlot);
    }
    var height = padTop + plotH + padBottom;
    var baseY = padTop + plotH;
    var SEP = 1.6; // white gap between stacked meals

    var svg = '<svg width="' + width + '" height="' + height + '" viewBox="0 0 ' + width + ' ' + height + '" role="img" aria-label="' + (opts.ariaLabel || "") + '">';

    [0, maxVal / 2, maxVal].forEach(function (t) {
      var y = baseY - (maxVal ? (t / maxVal) * plotH : 0);
      svg += '<line class="axis-line" x1="' + padLeft + '" y1="' + y + '" x2="' + (width - padRight) + '" y2="' + y + '" />';
      svg += '<text class="axis-label" x="' + (padLeft - 10) + '" y="' + (y + 4) + '" style="text-anchor:end">' + fmtNum(Math.round(t)) + '</text>';
    });

    cols.forEach(function (c, i) {
      var val = c.total;
      var h = maxVal ? (val / maxVal) * plotH : 0;
      var x = padLeft + i * barSlot + (barSlot - barW) / 2;
      var y = baseY - h;
      var cx = x + barW / 2;
      var meals = c.meals || [];

      // Stack segments from the bottom up; only the topmost gets rounded corners.
      var cursor = baseY;
      meals.forEach(function (en, m) {
        var segH = maxVal ? (en.estimatedCalories / maxVal) * plotH : 0;
        var segTop = cursor - segH;
        var lvl = entryLevel(en);
        var fill = segColor(lvl, c.today);
        var title = escapeHtml(en.what) + " — " + en.estimatedCalories + " cal · " + (lvl === -1 ? "Not rated" : SELF_ASSESSMENTS[lvl]);
        if (m === meals.length - 1) {
          svg += '<path d="' + topRoundedRect(x, segTop, barW, segH, 7) + '" fill="' + fill + '"><title>' + title + '</title></path>';
        } else {
          svg += '<rect x="' + x + '" y="' + segTop + '" width="' + barW + '" height="' + segH + '" fill="' + fill + '"><title>' + title + '</title></rect>';
          svg += '<rect x="' + x + '" y="' + (segTop - SEP / 2) + '" width="' + barW + '" height="' + SEP + '" fill="#ffffff" />';
        }
        cursor = segTop;
      });

      // Past bars get a thin outline ("fixed"); today's has none.
      if (!c.today && h > 0) {
        svg += '<path d="' + topRoundedRect(x, y, barW, h, 7) + '" fill="none" stroke="rgba(54,42,28,.3)" stroke-width="1.5" />';
      }

      // Caption: bold total on top, optional lean sub-lines beneath.
      if (val > 0 || meals.length) {
        svg += '<text class="bar-value" x="' + cx + '" y="' + (y - totalGap) + '">' + fmtNum(val) + '</text>';
      }
      (c.sub || []).forEach(function (s, k) {
        svg += '<text class="bar-meta" x="' + cx + '" y="' + (y - (totalGap - 13 * (k + 1))) + '">' + s + '</text>';
      });
      svg += '<text class="axis-label' + (c.todayLabel ? " today" : "") + '" x="' + cx + '" y="' + (baseY + 18) + '">' + c.xlabel + '</text>';
    });

    svg += '</svg>';
    chartEl.innerHTML = svg + (opts.legend || "") + (opts.notes || "");
  }

  // Chart 1: calories per day (stacked by meal), with LM/FW captions.
  function renderDayChart() {
    var chart = document.getElementById("chart");
    var byDate = {};
    entries.forEach(function (en) { (byDate[en.date] = byDate[en.date] || []).push(en); });
    var dates = Object.keys(byDate).sort();
    if (!dates.length) {
      chart.innerHTML = '<div class="empty">No entries yet — add one above to see your daily totals.</div>';
      return;
    }
    Object.keys(byDate).forEach(function (k) { byDate[k].sort(byTimeAsc); });
    var todayKey = dateStr(new Date());
    function fastWindowMin(date) {
      var meals = byDate[date], prev = byDate[prevDateStr(date)];
      if (!meals || !meals.length || !prev || !prev.length) return null;
      return (1440 - timeToMin(prev[prev.length - 1].time)) + timeToMin(meals[0].time);
    }
    var cols = dates.map(function (d) {
      var meals = byDate[d];
      var isToday = d === todayKey;
      var sub = [];
      if (!isToday) {
        sub.push("LM: " + meals[meals.length - 1].time);
        var fw = fastWindowMin(d);
        sub.push("FW: " + (fw == null ? "—" : fmtHours(fw)));
      }
      var total = meals.reduce(function (s, en) { return s + en.estimatedCalories; }, 0);
      return { meals: meals, total: total, xlabel: isToday ? "Today" : d.slice(5), today: isToday, todayLabel: isToday, sub: sub };
    });
    var notes = '<div class="chart-notes">LM = last meal · FW = fasting window (first meal − previous day\'s last meal)</div>';
    drawStacked(chart, cols, { barSlot: 64, barW: 38, ariaLabel: "Bar chart of calories per day, stacked by meal and coloured by self assessment", legend: colorLegend(), notes: notes });
  }

  // Chart 2: calories by time of day for one selected day.
  function renderHourChart(date) {
    var chart = document.getElementById("chart");
    var meals = entries.filter(function (en) { return en.date === date; }).sort(byTimeAsc);
    if (!meals.length) {
      chart.innerHTML = '<div class="empty">No meals logged on ' + escapeHtml(formatDateShort(date)) + '.</div>' + colorLegend();
      return;
    }
    var isToday = date === dateStr(new Date());
    // Bucket meals into the fixed parts of the day (always show all parts).
    var buckets = DAY_PARTS.map(function () { return []; });
    meals.forEach(function (en) { buckets[partIndexForHour(+en.time.slice(0, 2))].push(en); });
    var cols = DAY_PARTS.map(function (part, i) {
      var bm = buckets[i]; // already in eating order (meals were sorted)
      return {
        meals: bm,
        total: bm.reduce(function (s, en) { return s + en.estimatedCalories; }, 0),
        xlabel: part.name,
        today: isToday,
        todayLabel: false,
        sub: []
      };
    });
    drawStacked(chart, cols, {
      fitWidth: chart.clientWidth || 600,
      barW: 46,
      ariaLabel: "Bar chart of calories by part of day for " + date + ", stacked by meal",
      legend: colorLegend()
    });
  }

  function renderChart() {
    if (selectedDay) { updateDayBtn(); if (!dayPop.classList.contains("hidden")) renderCalendar(); }
    if (activeChart === "hour") renderHourChart(selectedDay);
    else renderDayChart();
  }

  // --- Chart view toggle + custom day-picker calendar ---
  function defaultDay() {
    var t = dateStr(new Date()), has = {};
    entries.forEach(function (en) { has[en.date] = true; });
    if (has[t]) return t;
    var keys = Object.keys(has).sort();
    return keys.length ? keys[keys.length - 1] : t;
  }
  function updateDayBtn() {
    dayBtn.textContent = (selectedDay === dateStr(new Date())) ? "Today" : formatDateShort(selectedDay);
    dayNext.disabled = selectedDay >= dateStr(new Date()); // can't review the future
  }
  // Step one calendar day at a time (capped at today going forward).
  function stepDay(delta) {
    var d = new Date(selectedDay + "T00:00:00");
    d.setDate(d.getDate() + delta);
    var iso = dateStr(d);
    if (delta > 0 && iso > dateStr(new Date())) return;
    selectedDay = iso;
    if (!dayPop.classList.contains("hidden")) pickerMonth = { y: d.getFullYear(), m: d.getMonth() };
    updateDayBtn();
    renderChart();
  }
  function renderCalendar() {
    var y = pickerMonth.y, m = pickerMonth.m;
    var startDow = new Date(y, m, 1).getDay();
    var daysInMonth = new Date(y, m + 1, 0).getDate();
    var logged = {}; entries.forEach(function (en) { logged[en.date] = true; });
    var today = dateStr(new Date());
    var html = '<div class="dp-head">' +
      '<button type="button" class="dp-nav" data-d="-1" aria-label="Previous month">‹</button>' +
      '<span class="dp-title">' + MONTHS[m] + ' ' + y + '</span>' +
      '<button type="button" class="dp-nav" data-d="1" aria-label="Next month">›</button></div>' +
      '<div class="dp-grid">';
    ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"].forEach(function (w) { html += '<div class="dp-wd">' + w + '</div>'; });
    for (var i = 0; i < startDow; i++) html += '<div class="dp-day empty"></div>';
    for (var d = 1; d <= daysInMonth; d++) {
      var iso = y + "-" + pad(m + 1) + "-" + pad(d);
      var cls = "dp-day";
      if (logged[iso]) cls += " logged";
      if (iso === today) cls += " today";
      if (iso === selectedDay) cls += " selected";
      html += '<div class="' + cls + '" data-date="' + iso + '">' + d + '</div>';
    }
    dayPop.innerHTML = html + '</div>';
  }
  function openPicker() {
    var p = selectedDay.split("-");
    pickerMonth = { y: +p[0], m: +p[1] - 1 };
    renderCalendar();
    dayPop.classList.remove("hidden");
  }
  function closePicker() { dayPop.classList.add("hidden"); }

  dayBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    if (dayPop.classList.contains("hidden")) openPicker(); else closePicker();
  });
  dayPrev.addEventListener("click", function () { stepDay(-1); });
  dayNext.addEventListener("click", function () { stepDay(1); });
  dayPop.addEventListener("click", function (e) {
    var nav = e.target.closest(".dp-nav");
    if (nav) {
      pickerMonth.m += (+nav.getAttribute("data-d"));
      if (pickerMonth.m < 0) { pickerMonth.m = 11; pickerMonth.y--; }
      else if (pickerMonth.m > 11) { pickerMonth.m = 0; pickerMonth.y++; }
      renderCalendar();
      return;
    }
    var day = e.target.closest(".dp-day[data-date]");
    if (day) {
      selectedDay = day.getAttribute("data-date");
      updateDayBtn();
      closePicker();
      renderChart();
    }
  });
  document.addEventListener("click", function (e) { if (!e.target.closest("#daypicker")) closePicker(); });
  document.addEventListener("keydown", function (e) { if (e.key === "Escape") closePicker(); });

  chartToggle.addEventListener("click", function (e) {
    var btn = e.target.closest("button[data-chart]");
    if (!btn) return;
    activeChart = btn.getAttribute("data-chart");
    Array.prototype.forEach.call(chartToggle.children, function (b) { b.classList.toggle("active", b === btn); });
    daypicker.classList.toggle("hidden", activeChart !== "hour");
    renderChart();
  });

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // Semantic chip colors so the table reads at a glance.
  var CATEGORY_TAG = { Breakfast: "tag-orange", Lunch: "tag-green", Dinner: "tag-purple", Beverage: "tag-teal", Snack: "tag-blue" };
  var SELF_TAG = { "Nasty": "tag-red", "Okay": "tag-amber", "Healthy-ish": "tag-lime", "Healthy": "tag-green" };

  function chip(value, cls) {
    return '<span class="tag ' + (cls || "") + '">' + escapeHtml(value) + "</span>";
  }
  // A chip cell, or an em-dash when the optional value is blank.
  function chipCell(value, cls) {
    return value ? "<td>" + chip(value, cls) + "</td>" : '<td class="muted-cell">—</td>';
  }

  function renderTable() {
    var wrap = document.getElementById("table-wrap");
    if (entries.length === 0) {
      wrap.innerHTML = '<div class="empty">No entries yet.</div>';
      return;
    }

    var sorted = sortedNewestFirst();

    var html = '<div class="table-scroll"><table><thead><tr>' +
      '<th>What</th><th>Category</th><th>Self assessment</th><th>Prep mode</th>' +
      '<th class="nowrap">Date</th><th>Time</th>' +
      '<th class="num nowrap">Cals</th><th>Actions</th>' +
      '</tr></thead><tbody>';

    sorted.forEach(function (en) {
      html += '<tr>' +
        '<td class="what">' + escapeHtml(en.what) + '</td>' +
        '<td>' + chip(en.category, CATEGORY_TAG[en.category]) + '</td>' +
        chipCell(en.selfAssessment, SELF_TAG[en.selfAssessment]) +
        chipCell(en.prepMode, "tag-slate") +
        '<td class="nowrap">' + escapeHtml(formatDateShort(en.date)) + '</td>' +
        '<td class="nowrap">' + escapeHtml(en.time) + '</td>' +
        '<td class="num">' + en.estimatedCalories + '</td>' +
        '<td class="table-actions">' +
          '<button class="icon-btn" data-edit="' + en.id + '">Edit</button>' +
          '<button class="icon-btn danger" data-delete="' + en.id + '">Delete</button>' +
        '</td>' +
      '</tr>';
    });

    html += '</tbody></table></div>';
    wrap.innerHTML = html;

    wrap.querySelectorAll("[data-edit]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var entry = entries.find(function (en) { return en.id === btn.getAttribute("data-edit"); });
        if (entry) loadEntryIntoForm(entry);
      });
    });
    wrap.querySelectorAll("[data-delete]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-delete");
        entries = entries.filter(function (en) { return en.id !== id; });
        if (editingId === id) resetForm();
        saveEntries();
        render();
      });
    });
  }

  // --- Init ---
  saveEntries(); // persist any one-time migration from loadEntries()
  selectedDay = defaultDay();
  updateDayBtn();
  resetForm();
  render();
})();
</script>
</body>

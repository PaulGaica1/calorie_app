<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calorie Tracker</title>
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --border: #e2e5ea;
    --text: #1d2330;
    --muted: #6b7280;
    --accent: #2f6fed;
    --accent-soft: #e7eefc;
    --danger: #dc2626;
    --ok: #16a34a;
    --radius: 12px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .container {
    max-width: 880px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }

  h1 {
    font-size: 24px;
    margin: 8px 0 24px;
  }

  h2 {
    font-size: 16px;
    margin: 0 0 16px;
    color: var(--text);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .field { margin-bottom: 16px; }

  input[type="text"],
  input[type="number"],
  input[type="date"],
  input[type="time"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    background: #fff;
    color: var(--text);
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  /* Segmented control */
  .segmented {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .segmented input { position: absolute; opacity: 0; pointer-events: none; }
  .segmented label {
    margin: 0;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-weight: 500;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    user-select: none;
    background: #fff;
    transition: background .12s, border-color .12s, color .12s;
  }
  .segmented label:hover { border-color: var(--accent); }
  .segmented input:checked + label {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .segmented input:focus-visible + label {
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .row {
    display: flex;
    gap: 16px;
  }
  .row > .field { flex: 1; margin-bottom: 16px; }

  .quick {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .quick button {
    padding: 5px 10px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--muted);
    border-radius: 999px;
    cursor: pointer;
  }
  .quick button:hover { border-color: var(--accent); color: var(--accent); }

  .actions {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-top: 8px;
  }

  .btn {
    padding: 10px 18px;
    border-radius: 8px;
    border: 1px solid transparent;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2559c9; }
  .btn-ghost { background: #fff; color: var(--muted); border-color: var(--border); }
  .btn-ghost:hover { color: var(--text); }

  .error {
    color: var(--danger);
    font-size: 13px;
    margin-top: 12px;
    min-height: 0;
  }

  /* Chart */
  .chart-wrap { overflow-x: auto; }
  svg { display: block; }
  .bar { fill: var(--accent); }
  .bar:hover { fill: #2559c9; }
  .bar-value { fill: var(--text); font-size: 11px; font-weight: 600; text-anchor: middle; }
  .axis-label { fill: var(--muted); font-size: 11px; text-anchor: middle; }
  .axis-line { stroke: var(--border); stroke-width: 1; }

  /* Table */
  table { width: 100%; border-collapse: collapse; }
  th, td {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  th { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .03em; }
  td.num, th.num { text-align: right; }
  .tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .link-btn {
    background: none;
    border: none;
    padding: 0;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--accent);
  }
  .link-btn.danger { color: var(--danger); }
  .link-btn:hover { text-decoration: underline; }
  .table-actions { white-space: nowrap; }
  .table-actions button + button { margin-left: 12px; }

  .empty {
    color: var(--muted);
    text-align: center;
    padding: 28px 0;
    font-size: 14px;
  }

  .editing-banner {
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 12px;
    border-radius: 8px;
    margin-bottom: 16px;
  }
  .hidden { display: none; }

  @media (max-width: 560px) {
    .row { flex-direction: column; gap: 0; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🍽️ Calorie Tracker</h1>

  <!-- 1. Entry form -->
  <section class="card">
    <h2>Add entry</h2>
    <div id="editing-banner" class="editing-banner hidden">Editing entry — make your changes and click Update.</div>
    <form id="entry-form" novalidate>
      <div class="field">
        <label for="what">What</label>
        <input type="text" id="what" placeholder="e.g. Chicken sandwich, Coffee, Pizza" autocomplete="off" />
      </div>

      <div class="field">
        <label>Category</label>
        <div class="segmented" id="category-group"></div>
      </div>

      <div class="row">
        <div class="field">
          <label for="date">Date</label>
          <input type="date" id="date" />
          <div class="quick">
            <button type="button" data-date="today">Today</button>
            <button type="button" data-date="yesterday">Yesterday</button>
          </div>
        </div>
        <div class="field">
          <label for="time">Time</label>
          <input type="time" id="time" />
          <div class="quick">
            <button type="button" data-time="0">Now</button>
            <button type="button" data-time="15">15 min ago</button>
            <button type="button" data-time="30">30 min ago</button>
            <button type="button" data-time="60">1 hour ago</button>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="calories">Estimated cals</label>
        <input type="number" id="calories" min="1" step="1" placeholder="e.g. 550" />
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-primary" id="save-btn">Save entry</button>
        <button type="button" class="btn btn-ghost hidden" id="cancel-btn">Cancel</button>
      </div>
      <div class="error" id="error" role="alert"></div>
    </form>
  </section>

  <!-- 2. Calories-per-day chart -->
  <section class="card">
    <h2>Calories per day</h2>
    <div class="chart-wrap" id="chart"></div>
  </section>

  <!-- 3. Entries table -->
  <section class="card">
    <h2>Entries</h2>
    <div id="table-wrap"></div>
  </section>
</div>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "calorie-entries";
  var CATEGORIES = ["Breakfast", "Lunch", "Dinner", "Beverage", "Snack - healthy", "Snack - nasty"];

  // --- State ---
  var entries = loadEntries();
  var editingId = null; // null = creating, otherwise editing existing entry id

  // --- Element refs ---
  var form = document.getElementById("entry-form");
  var whatEl = document.getElementById("what");
  var categoryGroup = document.getElementById("category-group");
  var dateEl = document.getElementById("date");
  var timeEl = document.getElementById("time");
  var caloriesEl = document.getElementById("calories");
  var errorEl = document.getElementById("error");
  var saveBtn = document.getElementById("save-btn");
  var cancelBtn = document.getElementById("cancel-btn");
  var editingBanner = document.getElementById("editing-banner");

  // --- Build category segmented control ---
  CATEGORIES.forEach(function (cat, i) {
    var id = "cat-" + i;
    var input = document.createElement("input");
    input.type = "radio";
    input.name = "category";
    input.id = id;
    input.value = cat;
    var label = document.createElement("label");
    label.setAttribute("for", id);
    label.textContent = cat;
    categoryGroup.appendChild(input);
    categoryGroup.appendChild(label);
  });

  // --- Persistence ---
  function loadEntries() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      var parsed = raw ? JSON.parse(raw) : [];
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
      return [];
    }
  }
  function saveEntries() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    } catch (e) {
      /* storage may be unavailable; app still works in-memory */
    }
  }

  // --- Datetime helpers (local time) ---
  function pad(n) { return n < 10 ? "0" + n : "" + n; }
  function dateStr(d) { return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); }
  function timeStr(d) { return pad(d.getHours()) + ":" + pad(d.getMinutes()); }

  // --- Form helpers ---
  function getSelectedCategory() {
    var checked = categoryGroup.querySelector("input:checked");
    return checked ? checked.value : "";
  }
  function setSelectedCategory(value) {
    var inputs = categoryGroup.querySelectorAll("input");
    inputs.forEach(function (inp) { inp.checked = inp.value === value; });
  }

  // Reset form to a clean "create" state, re-filling date/time with the
  // current local moment (recomputed every time this runs, not just on load).
  function resetForm() {
    editingId = null;
    var now = new Date();
    form.reset();
    whatEl.value = "";
    caloriesEl.value = "";
    setSelectedCategory("");
    dateEl.value = dateStr(now);
    timeEl.value = timeStr(now);
    errorEl.textContent = "";
    saveBtn.textContent = "Save entry";
    cancelBtn.classList.add("hidden");
    editingBanner.classList.add("hidden");
  }

  function loadEntryIntoForm(entry) {
    editingId = entry.id;
    whatEl.value = entry.what;
    setSelectedCategory(entry.category);
    dateEl.value = entry.date;
    timeEl.value = entry.time;
    caloriesEl.value = entry.estimatedCalories;
    errorEl.textContent = "";
    saveBtn.textContent = "Update entry";
    cancelBtn.classList.remove("hidden");
    editingBanner.classList.remove("hidden");
    whatEl.focus();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  // --- Validation ---
  // Returns { ok: true, value } or { ok: false, message }
  function validate() {
    var what = whatEl.value.trim();
    if (!what) return { ok: false, message: "Please enter what you ate or drank." };

    var category = getSelectedCategory();
    if (CATEGORIES.indexOf(category) === -1) return { ok: false, message: "Please choose a category." };

    var date = dateEl.value;
    if (!date || isNaN(new Date(date + "T00:00:00").getTime())) {
      return { ok: false, message: "Please enter a valid date." };
    }

    var time = timeEl.value;
    if (!/^\d{2}:\d{2}$/.test(time)) return { ok: false, message: "Please enter a valid time (HH:MM)." };

    var calories = Number(caloriesEl.value);
    if (!caloriesEl.value || isNaN(calories) || calories <= 0) {
      return { ok: false, message: "Estimated cals must be a positive number." };
    }

    return {
      ok: true,
      value: {
        what: what,
        category: category,
        date: date,
        time: time,
        estimatedCalories: Math.round(calories)
      }
    };
  }

  // --- Save / submit ---
  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var result = validate();
    if (!result.ok) {
      errorEl.textContent = result.message;
      return;
    }
    var v = result.value;
    var timestamp = v.date + "T" + v.time + ":00";

    if (editingId) {
      var existing = entries.find(function (en) { return en.id === editingId; });
      if (existing) {
        existing.what = v.what;
        existing.category = v.category;
        existing.date = v.date;
        existing.time = v.time;
        existing.estimatedCalories = v.estimatedCalories;
        existing.timestamp = timestamp;
      }
    } else {
      entries.push({
        id: (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random()),
        what: v.what,
        category: v.category,
        date: v.date,
        time: v.time,
        estimatedCalories: v.estimatedCalories,
        timestamp: timestamp
      });
    }
    saveEntries();
    render();
    resetForm();
  });

  cancelBtn.addEventListener("click", resetForm);

  // Quick date buttons
  document.querySelectorAll("[data-date]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var d = new Date();
      if (btn.getAttribute("data-date") === "yesterday") d.setDate(d.getDate() - 1);
      dateEl.value = dateStr(d);
    });
  });

  // Quick time buttons (minutes-ago, recomputed from the current moment)
  document.querySelectorAll("[data-time]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var mins = parseInt(btn.getAttribute("data-time"), 10);
      var d = new Date();
      d.setMinutes(d.getMinutes() - mins);
      timeEl.value = timeStr(d);
    });
  });

  // --- Rendering ---
  function render() {
    renderChart();
    renderTable();
  }

  function renderChart() {
    var chart = document.getElementById("chart");

    // Group by date, sum calories.
    var totals = {};
    entries.forEach(function (en) {
      totals[en.date] = (totals[en.date] || 0) + en.estimatedCalories;
    });
    var dates = Object.keys(totals).sort(); // ISO dates sort chronologically

    if (dates.length === 0) {
      chart.innerHTML = '<div class="empty">No entries yet — add one above to see your daily totals.</div>';
      return;
    }

    var maxVal = 0;
    dates.forEach(function (d) { if (totals[d] > maxVal) maxVal = totals[d]; });

    // Layout
    var padTop = 24, padBottom = 48, padLeft = 48, padRight = 12;
    var barSlot = 56;
    var barW = 34;
    var plotH = 200;
    var width = padLeft + padRight + dates.length * barSlot;
    var minWidth = 320;
    if (width < minWidth) width = minWidth;
    var height = padTop + plotH + padBottom;
    var baseY = padTop + plotH;

    var svg = '<svg width="' + width + '" height="' + height + '" viewBox="0 0 ' + width + ' ' + height + '" role="img" aria-label="Bar chart of total calories per day">';

    // Y axis gridlines/labels (0, half, max)
    var ticks = [0, maxVal / 2, maxVal];
    ticks.forEach(function (t) {
      var y = baseY - (maxVal ? (t / maxVal) * plotH : 0);
      svg += '<line class="axis-line" x1="' + padLeft + '" y1="' + y + '" x2="' + (width - padRight) + '" y2="' + y + '" />';
      svg += '<text class="axis-label" x="' + (padLeft - 8) + '" y="' + (y + 4) + '" style="text-anchor:end">' + Math.round(t) + '</text>';
    });

    dates.forEach(function (d, i) {
      var val = totals[d];
      var h = maxVal ? (val / maxVal) * plotH : 0;
      var x = padLeft + i * barSlot + (barSlot - barW) / 2;
      var y = baseY - h;
      svg += '<rect class="bar" x="' + x + '" y="' + y + '" width="' + barW + '" height="' + h + '" rx="4"><title>' + d + ': ' + val + ' cal</title></rect>';
      svg += '<text class="bar-value" x="' + (x + barW / 2) + '" y="' + (y - 5) + '">' + val + '</text>';
      // X label: show MM-DD to keep compact
      var lbl = d.slice(5);
      svg += '<text class="axis-label" x="' + (x + barW / 2) + '" y="' + (baseY + 16) + '">' + lbl + '</text>';
    });

    svg += '</svg>';
    chart.innerHTML = svg;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function renderTable() {
    var wrap = document.getElementById("table-wrap");
    if (entries.length === 0) {
      wrap.innerHTML = '<div class="empty">No entries yet.</div>';
      return;
    }

    // Sort by timestamp, newest first.
    var sorted = entries.slice().sort(function (a, b) {
      return a.timestamp < b.timestamp ? 1 : a.timestamp > b.timestamp ? -1 : 0;
    });

    var html = '<table><thead><tr>' +
      '<th>What</th><th>Category</th><th>Date</th><th>Time</th>' +
      '<th class="num">Estimated cals</th><th>Actions</th>' +
      '</tr></thead><tbody>';

    sorted.forEach(function (en) {
      html += '<tr>' +
        '<td>' + escapeHtml(en.what) + '</td>' +
        '<td><span class="tag">' + escapeHtml(en.category) + '</span></td>' +
        '<td>' + escapeHtml(en.date) + '</td>' +
        '<td>' + escapeHtml(en.time) + '</td>' +
        '<td class="num">' + en.estimatedCalories + '</td>' +
        '<td class="table-actions">' +
          '<button class="link-btn" data-edit="' + en.id + '">Edit</button>' +
          '<button class="link-btn danger" data-delete="' + en.id + '">Delete</button>' +
        '</td>' +
      '</tr>';
    });

    html += '</tbody></table>';
    wrap.innerHTML = html;

    wrap.querySelectorAll("[data-edit]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var entry = entries.find(function (en) { return en.id === btn.getAttribute("data-edit"); });
        if (entry) loadEntryIntoForm(entry);
      });
    });
    wrap.querySelectorAll("[data-delete]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-delete");
        entries = entries.filter(function (en) { return en.id !== id; });
        if (editingId === id) resetForm();
        saveEntries();
        render();
      });
    });
  }

  // --- Init ---
  resetForm();
  render();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Habbit Rabbit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" />
<style>
  :root {
    --bg: #f7f3ec;
    --bg-2: #f1ebe1;
    --card: #ffffff;
    --border: #ece4d8;
    --text: #2c2a25;
    --muted: #8c8377;
    --accent: #2f9e6e;
    --accent-d: #268a5f;
    --accent-soft: #e3f3ea;
    --coral: #f2674f;
    --danger: #d64541;
    --danger-soft: #fbe9e7;
    --radius: 16px;
    --shadow-sm: 0 1px 2px rgba(74, 60, 42, .05);
    --shadow: 0 2px 8px rgba(74, 60, 42, .05), 0 18px 36px -22px rgba(74, 60, 42, .35);
    --font-body: "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-display: "Fredoka", ui-rounded, "Segoe UI", system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .container {
    max-width: 880px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }

  /* Header */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin: 4px 2px 26px;
  }
  .brand { display: flex; align-items: center; gap: 13px; }
  .brand .logo {
    width: 54px; height: 54px;
    border-radius: 15px;
    box-shadow: var(--shadow-sm);
    flex-shrink: 0;
    display: block;
  }
  .brand h1 {
    font-family: var(--font-display);
    font-size: 44px;
    font-weight: 700;
    letter-spacing: 0;
    line-height: 1;
    margin: 0;
  }
  .today-stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 9px 16px;
    box-shadow: var(--shadow);
    text-align: right;
    flex-shrink: 0;
  }
  .today-stat .label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: .07em;
    font-weight: 700;
    color: var(--muted);
  }
  .today-stat .value {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.15;
    font-variant-numeric: tabular-nums;
  }
  .today-stat .value span {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-left: 3px;
  }

  h2 {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    margin: 0 0 18px;
    color: var(--text);
    letter-spacing: .01em;
  }

  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
  }
  .section-head h2 { margin: 0; }
  .btn:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 7px;
  }

  .field { margin-bottom: 18px; }

  .optional-note { color: var(--muted); font-weight: 400; }

  input[type="text"],
  input[type="number"],
  input[type="date"],
  input[type="time"] {
    width: 100%;
    padding: 11px 13px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    background: #fffdfb;
    color: var(--text);
    transition: border-color .12s, box-shadow .12s;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  /* Segmented control */
  .segmented {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }
  .segmented input { position: absolute; opacity: 0; pointer-events: none; }
  .segmented label {
    margin: 0;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-weight: 500;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    user-select: none;
    background: #fffdfb;
    /* soft raised resting state */
    box-shadow: 0 1px 2px rgba(74, 60, 42, .06);
    transition: background .14s, border-color .14s, color .14s, box-shadow .14s, transform .12s;
  }
  .segmented label:hover { border-color: var(--accent); color: var(--accent-d); }
  .segmented label:active { transform: translateY(1px); }
  /* selected = pressed in: interior shade + nudged down, no outer lift */
  .segmented input:checked + label {
    background: var(--accent);
    border-color: var(--accent-d);
    color: #fff;
    transform: translateY(1px);
    box-shadow: inset 0 2px 5px rgba(17, 64, 43, .55), inset 0 -1px 0 rgba(255, 255, 255, .12);
  }
  .segmented input:focus-visible + label {
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .row {
    display: flex;
    gap: 16px;
  }
  .row > .field { flex: 1; margin-bottom: 18px; }

  .quick {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 9px;
  }
  .quick button {
    padding: 5px 11px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: #fffdfb;
    color: var(--muted);
    border-radius: 999px;
    cursor: pointer;
    transition: border-color .12s, color .12s, background .12s, box-shadow .12s, transform .1s;
  }
  .quick button:hover { border-color: var(--accent); color: var(--accent-d); background: var(--accent-soft); }
  .quick button:active { transform: translateY(1px); box-shadow: inset 0 2px 4px rgba(74, 60, 42, .14); }

  .actions {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-top: 6px;
  }

  .btn {
    font-family: var(--font-display);
    padding: 11px 22px;
    border-radius: 13px;
    border: 1px solid transparent;
    font-size: 15.5px;
    font-weight: 600;
    letter-spacing: .01em;
    cursor: pointer;
    transition: background .14s, transform .08s, box-shadow .14s, color .14s, border-color .14s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 8px 18px -7px var(--accent);
  }
  .btn-primary:hover { background: var(--accent-d); transform: translateY(-1px); }
  .btn-primary:active {
    transform: translateY(1px);
    box-shadow: inset 0 3px 8px rgba(17, 64, 43, .55);
  }
  .btn-ghost { background: #fffdfb; color: var(--text); border-color: var(--border); box-shadow: var(--shadow-sm); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent-d); background: var(--accent-soft); }
  .btn-ghost:active {
    transform: translateY(1px);
    box-shadow: inset 0 2px 6px rgba(74, 60, 42, .18);
  }

  .error {
    color: var(--danger);
    font-size: 13px;
    margin-top: 12px;
    min-height: 0;
  }

  /* Chart */
  .chart-wrap { overflow-x: auto; }
  .chart-wrap svg { display: block; margin: 0 auto; }
  .bar-value { fill: var(--text); font-family: var(--font-display); font-size: 12.5px; font-weight: 600; text-anchor: middle; font-variant-numeric: tabular-nums; }
  .axis-label { fill: var(--muted); font-size: 11px; text-anchor: middle; }
  .axis-label.today { fill: var(--coral); font-weight: 700; }
  .axis-line { stroke: #efe7da; stroke-width: 1; }

  /* Table */
  .table-scroll { overflow-x: auto; margin: 0 -4px; }
  table { width: 100%; border-collapse: collapse; }
  th, td {
    text-align: left;
    padding: 11px 9px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  th:first-child, td:first-child { padding-left: 4px; }
  th:last-child, td:last-child { padding-right: 4px; }
  td.nowrap, th.nowrap { white-space: nowrap; }
  thead th { border-bottom-width: 1.5px; }
  th { color: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; white-space: nowrap; }
  tbody tr { transition: background .12s; }
  tbody tr:hover { background: #faf7f1; }
  tbody tr:last-child td { border-bottom: none; }
  td.what { font-weight: 600; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.muted-cell { color: var(--muted); }

  .tag {
    display: inline-block;
    padding: 3px 11px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent-d);
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    line-height: 1.45;
  }
  .tag-green  { background: #e3f3ea; color: #1f8a5b; }
  .tag-red    { background: #fbe7e4; color: #cc3f39; }
  .tag-amber  { background: #fbeed8; color: #b0710a; }
  .tag-slate  { background: #edeef1; color: #5d6b7a; }
  .tag-orange { background: #fce9d9; color: #bd6510; }
  .tag-teal   { background: #def2f0; color: #1c8a86; }
  .tag-purple { background: #f0e8fb; color: #7a4fce; }
  .tag-blue   { background: #e6eefc; color: #2f6fed; }

  .icon-btn {
    background: none;
    border: 1px solid transparent;
    padding: 5px 11px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--accent-d);
    border-radius: 8px;
    transition: background .12s, color .12s;
  }
  .icon-btn:hover { background: var(--accent-soft); }
  .icon-btn.danger { color: var(--danger); }
  .icon-btn.danger:hover { background: var(--danger-soft); }
  .table-actions { white-space: nowrap; }
  .table-actions button + button { margin-left: 4px; }

  .empty {
    color: var(--muted);
    text-align: center;
    padding: 34px 0;
    font-size: 14px;
  }

  .editing-banner {
    background: #fff5ea;
    color: #b0710a;
    border: 1px solid #f6e2c4;
    font-size: 13px;
    font-weight: 600;
    padding: 9px 13px;
    border-radius: 10px;
    margin-bottom: 18px;
  }
  .hidden { display: none; }

  @media (max-width: 560px) {
    .row { flex-direction: column; gap: 0; }
    .brand h1 { font-size: 30px; }
    .brand .logo { width: 46px; height: 46px; }
    .today-stat { padding: 7px 13px; }
    .today-stat .value { font-size: 18px; }
    .card { padding: 18px; }
  }
</style>
</head>
<body>
<div class="container">
  <header class="app-header">
    <div class="brand">
      <svg class="logo" viewBox="0 0 44 44" width="54" height="54" aria-hidden="true">
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#43b582" />
            <stop offset="1" stop-color="#268a5f" />
          </linearGradient>
        </defs>
        <rect width="44" height="44" rx="13" fill="url(#logoGrad)" />
        <!-- ear: fully up -->
        <g transform="rotate(-9 20 27)">
          <ellipse cx="20" cy="17.6" rx="3.8" ry="9.6" fill="#ffffff" />
          <ellipse cx="20" cy="18.2" rx="1.7" ry="6.2" fill="#f7b9c4" />
        </g>
        <!-- ear: half down (leaning ~45° to the side) -->
        <g transform="rotate(48 21 27)">
          <ellipse cx="21" cy="18.4" rx="3.6" ry="8.6" fill="#ffffff" />
          <ellipse cx="21" cy="19" rx="1.5" ry="5.4" fill="#f7b9c4" />
        </g>
      </svg>
      <h1>Habbit Rabbit</h1>
    </div>
    <div class="today-stat">
      <div class="label">Today</div>
      <div class="value" id="today-value">0<span>cal</span></div>
    </div>
  </header>

  <!-- 1. Entry form -->
  <section class="card">
    <h2>Add entry</h2>
    <div id="editing-banner" class="editing-banner hidden">Editing entry — make your changes and click Update.</div>
    <form id="entry-form" novalidate>
      <div class="field">
        <label for="what">What</label>
        <input type="text" id="what" placeholder="e.g. Chicken sandwich, Coffee, Pizza" autocomplete="off" />
      </div>

      <div class="field">
        <label>Category</label>
        <div class="segmented" id="category-group"></div>
      </div>

      <div class="field">
        <label>Self assessment <span class="optional-note">(optional)</span></label>
        <div class="segmented" id="self-group"></div>
      </div>

      <div class="field">
        <label>Prep mode <span class="optional-note">(optional)</span></label>
        <div class="segmented" id="prep-group"></div>
      </div>

      <div class="row">
        <div class="field">
          <label for="date">Date</label>
          <input type="date" id="date" />
          <div class="quick">
            <button type="button" data-date="today">Today</button>
            <button type="button" data-date="yesterday">Yesterday</button>
          </div>
        </div>
        <div class="field">
          <label for="time">Time</label>
          <input type="time" id="time" />
          <div class="quick">
            <button type="button" data-time="0">Now</button>
            <button type="button" data-time="15">15 min ago</button>
            <button type="button" data-time="30">30 min ago</button>
            <button type="button" data-time="60">1 hour ago</button>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="calories">Estimated cals</label>
        <input type="number" id="calories" min="1" step="1" placeholder="e.g. 550" />
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-primary" id="save-btn">Save entry</button>
        <button type="button" class="btn btn-ghost hidden" id="cancel-btn">Cancel</button>
      </div>
      <div class="error" id="error" role="alert"></div>
    </form>
  </section>

  <!-- 2. Calories-per-day chart -->
  <section class="card">
    <h2>Calories per day</h2>
    <div class="chart-wrap" id="chart"></div>
  </section>

  <!-- 3. Entries table -->
  <section class="card">
    <div class="section-head">
      <h2>Entries</h2>
      <button type="button" class="btn btn-ghost" id="export-btn">Export CSV</button>
    </div>
    <div id="table-wrap"></div>
  </section>
</div>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "calorie-entries";
  var CATEGORIES = ["Breakfast", "Lunch", "Dinner", "Beverage", "Snack"];
  var SELF_ASSESSMENTS = ["Nasty", "Healthy", "Healthy but high calorie", "Misc"];
  var PREP_MODES = ["Home cooked", "Fridge scraps", "Delivery", "Restaurant", "Meal Prep", "Pick-up", "Office", "Other"];

  // --- State ---
  var entries = loadEntries();
  var editingId = null; // null = creating, otherwise editing existing entry id

  // --- Element refs ---
  var form = document.getElementById("entry-form");
  var whatEl = document.getElementById("what");
  var categoryGroup = document.getElementById("category-group");
  var selfGroup = document.getElementById("self-group");
  var prepGroup = document.getElementById("prep-group");
  var dateEl = document.getElementById("date");
  var timeEl = document.getElementById("time");
  var caloriesEl = document.getElementById("calories");
  var errorEl = document.getElementById("error");
  var saveBtn = document.getElementById("save-btn");
  var cancelBtn = document.getElementById("cancel-btn");
  var editingBanner = document.getElementById("editing-banner");
  var exportBtn = document.getElementById("export-btn");

  // --- Build segmented controls ---
  // optional=true lets the user clear the choice by tapping the selected option
  // again (plain radio buttons can't be unchecked otherwise).
  function buildSegmented(container, name, options, optional) {
    options.forEach(function (opt, i) {
      var id = name + "-" + i;
      var input = document.createElement("input");
      input.type = "radio";
      input.name = name;
      input.id = id;
      input.value = opt;
      var label = document.createElement("label");
      label.setAttribute("for", id);
      label.textContent = opt;
      container.appendChild(input);
      container.appendChild(label);

      if (optional) {
        input.addEventListener("click", function () {
          // At click time this radio is already checked. If it was already the
          // selected one before the click, clear the whole group instead.
          if (input.getAttribute("data-was-checked") === "1") {
            input.checked = false;
          }
          syncCheckedFlags(container);
        });
      }
    });
  }

  // Record current checked state so the optional click-to-clear logic can tell
  // whether a tapped option was already selected.
  function syncCheckedFlags(container) {
    container.querySelectorAll("input").forEach(function (inp) {
      inp.setAttribute("data-was-checked", inp.checked ? "1" : "0");
    });
  }

  buildSegmented(categoryGroup, "category", CATEGORIES, false);
  buildSegmented(selfGroup, "selfAssessment", SELF_ASSESSMENTS, true);
  buildSegmented(prepGroup, "prepMode", PREP_MODES, true);

  // --- Persistence ---
  function loadEntries() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      var parsed = raw ? JSON.parse(raw) : [];
      if (!Array.isArray(parsed)) return [];
      return parsed.map(migrateEntry);
    } catch (e) {
      return [];
    }
  }

  // Bring entries saved before Self assessment / Prep mode existed up to date:
  // fold the old "Snack - healthy/nasty" categories into "Snack" + a matching
  // self assessment, and default the new fields to "".
  function migrateEntry(en) {
    en.selfAssessment = en.selfAssessment || "";
    en.prepMode = en.prepMode || "";
    if (en.category === "Snack - healthy") {
      en.category = "Snack";
      if (!en.selfAssessment) en.selfAssessment = "Healthy";
    } else if (en.category === "Snack - nasty") {
      en.category = "Snack";
      if (!en.selfAssessment) en.selfAssessment = "Nasty";
    }
    return en;
  }
  function saveEntries() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    } catch (e) {
      /* storage may be unavailable; app still works in-memory */
    }
  }

  // --- Datetime helpers (local time) ---
  var MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  function pad(n) { return n < 10 ? "0" + n : "" + n; }
  function dateStr(d) { return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); }
  function timeStr(d) { return pad(d.getHours()) + ":" + pad(d.getMinutes()); }
  // Friendly, compact date for the table (e.g. "Jun 29"); adds the year only
  // when it isn't the current year. The stored ISO date is unchanged.
  function formatDateShort(iso) {
    var p = String(iso).split("-");
    if (p.length !== 3) return iso;
    var s = MONTHS[(+p[1]) - 1] + " " + (+p[2]);
    if (+p[0] !== new Date().getFullYear()) s += ", " + p[0];
    return s;
  }

  // --- Form helpers ---
  function getSelected(container) {
    var checked = container.querySelector("input:checked");
    return checked ? checked.value : "";
  }
  function setSelected(container, value) {
    container.querySelectorAll("input").forEach(function (inp) {
      inp.checked = inp.value === value;
    });
    syncCheckedFlags(container);
  }

  // Reset form to a clean "create" state, re-filling date/time with the
  // current local moment (recomputed every time this runs, not just on load).
  function resetForm() {
    editingId = null;
    var now = new Date();
    form.reset();
    whatEl.value = "";
    caloriesEl.value = "";
    setSelected(categoryGroup, "");
    setSelected(selfGroup, "");
    setSelected(prepGroup, "");
    dateEl.value = dateStr(now);
    timeEl.value = timeStr(now);
    errorEl.textContent = "";
    saveBtn.textContent = "Save entry";
    cancelBtn.classList.add("hidden");
    editingBanner.classList.add("hidden");
  }

  function loadEntryIntoForm(entry) {
    editingId = entry.id;
    whatEl.value = entry.what;
    setSelected(categoryGroup, entry.category);
    setSelected(selfGroup, entry.selfAssessment || "");
    setSelected(prepGroup, entry.prepMode || "");
    dateEl.value = entry.date;
    timeEl.value = entry.time;
    caloriesEl.value = entry.estimatedCalories;
    errorEl.textContent = "";
    saveBtn.textContent = "Update entry";
    cancelBtn.classList.remove("hidden");
    editingBanner.classList.remove("hidden");
    whatEl.focus();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  // --- Validation ---
  // Returns { ok: true, value } or { ok: false, message }
  function validate() {
    var what = whatEl.value.trim();
    if (!what) return { ok: false, message: "Please enter what you ate or drank." };

    var category = getSelected(categoryGroup);
    if (CATEGORIES.indexOf(category) === -1) return { ok: false, message: "Please choose a category." };

    // Self assessment and prep mode are optional.
    var selfAssessment = getSelected(selfGroup);
    var prepMode = getSelected(prepGroup);

    var date = dateEl.value;
    if (!date || isNaN(new Date(date + "T00:00:00").getTime())) {
      return { ok: false, message: "Please enter a valid date." };
    }

    var time = timeEl.value;
    if (!/^\d{2}:\d{2}$/.test(time)) return { ok: false, message: "Please enter a valid time (HH:MM)." };

    var calories = Number(caloriesEl.value);
    if (!caloriesEl.value || isNaN(calories) || calories <= 0) {
      return { ok: false, message: "Estimated cals must be a positive number." };
    }

    return {
      ok: true,
      value: {
        what: what,
        category: category,
        selfAssessment: selfAssessment,
        prepMode: prepMode,
        date: date,
        time: time,
        estimatedCalories: Math.round(calories)
      }
    };
  }

  // --- Save / submit ---
  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var result = validate();
    if (!result.ok) {
      errorEl.textContent = result.message;
      return;
    }
    var v = result.value;
    var timestamp = v.date + "T" + v.time + ":00";

    if (editingId) {
      var existing = entries.find(function (en) { return en.id === editingId; });
      if (existing) {
        existing.what = v.what;
        existing.category = v.category;
        existing.selfAssessment = v.selfAssessment;
        existing.prepMode = v.prepMode;
        existing.date = v.date;
        existing.time = v.time;
        existing.estimatedCalories = v.estimatedCalories;
        existing.timestamp = timestamp;
      }
    } else {
      entries.push({
        id: (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random()),
        what: v.what,
        category: v.category,
        selfAssessment: v.selfAssessment,
        prepMode: v.prepMode,
        date: v.date,
        time: v.time,
        estimatedCalories: v.estimatedCalories,
        timestamp: timestamp
      });
    }
    saveEntries();
    render();
    resetForm();
  });

  cancelBtn.addEventListener("click", resetForm);

  // Quick date buttons
  document.querySelectorAll("[data-date]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var d = new Date();
      if (btn.getAttribute("data-date") === "yesterday") d.setDate(d.getDate() - 1);
      dateEl.value = dateStr(d);
    });
  });

  // Quick time buttons (minutes-ago, recomputed from the current moment)
  document.querySelectorAll("[data-time]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var mins = parseInt(btn.getAttribute("data-time"), 10);
      var d = new Date();
      d.setMinutes(d.getMinutes() - mins);
      timeEl.value = timeStr(d);
    });
  });

  // Entries sorted by timestamp, newest first (shared by table + CSV export).
  function sortedNewestFirst() {
    return entries.slice().sort(function (a, b) {
      return a.timestamp < b.timestamp ? 1 : a.timestamp > b.timestamp ? -1 : 0;
    });
  }

  // --- CSV export ---
  // Quote every field and double any embedded quotes so commas, quotes and
  // newlines inside values can't break the columns.
  function escapeCsv(value) {
    return '"' + String(value == null ? "" : value).replace(/"/g, '""') + '"';
  }

  function entriesToCsv() {
    var columns = ["What", "Category", "Self assessment", "Prep mode", "Date", "Time", "Estimated cals"];
    var lines = [columns.map(escapeCsv).join(",")];
    sortedNewestFirst().forEach(function (en) {
      lines.push([
        en.what,
        en.category,
        en.selfAssessment || "",
        en.prepMode || "",
        en.date,
        en.time,
        en.estimatedCalories
      ].map(escapeCsv).join(","));
    });
    return lines.join("\r\n");
  }

  function downloadCsv() {
    if (entries.length === 0) return;
    // Leading BOM so Excel reads UTF-8 (accented characters) correctly.
    var blob = new Blob(["﻿" + entriesToCsv()], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "calorie-entries-" + dateStr(new Date()) + ".csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  exportBtn.addEventListener("click", downloadCsv);

  // --- Rendering ---
  var todayValueEl = document.getElementById("today-value");

  function render() {
    renderChart();
    renderTable();
    renderTodayStat();
    exportBtn.disabled = entries.length === 0;
  }

  function renderTodayStat() {
    var today = dateStr(new Date());
    var total = entries.reduce(function (sum, en) {
      return en.date === today ? sum + en.estimatedCalories : sum;
    }, 0);
    todayValueEl.innerHTML = total + "<span>cal</span>";
  }

  function renderChart() {
    var chart = document.getElementById("chart");

    // Group by date, sum calories.
    var totals = {};
    entries.forEach(function (en) {
      totals[en.date] = (totals[en.date] || 0) + en.estimatedCalories;
    });
    var dates = Object.keys(totals).sort(); // ISO dates sort chronologically

    if (dates.length === 0) {
      chart.innerHTML = '<div class="empty">No entries yet — add one above to see your daily totals.</div>';
      return;
    }

    var maxVal = 0;
    dates.forEach(function (d) { if (totals[d] > maxVal) maxVal = totals[d]; });

    var todayKey = dateStr(new Date());

    // Layout
    var padTop = 28, padBottom = 46, padLeft = 50, padRight = 16;
    var barSlot = 64;
    var barW = 38;
    var plotH = 210;
    var width = padLeft + padRight + dates.length * barSlot;
    var minWidth = 320;
    if (width < minWidth) width = minWidth;
    var height = padTop + plotH + padBottom;
    var baseY = padTop + plotH;

    // Path for a bar with only its top two corners rounded.
    function topRoundedRect(x, y, w, h, r) {
      r = Math.max(0, Math.min(r, h, w / 2));
      return "M" + x + "," + (y + h) +
        " L" + x + "," + (y + r) +
        " Q" + x + "," + y + " " + (x + r) + "," + y +
        " L" + (x + w - r) + "," + y +
        " Q" + (x + w) + "," + y + " " + (x + w) + "," + (y + r) +
        " L" + (x + w) + "," + (y + h) + " Z";
    }

    var svg = '<svg width="' + width + '" height="' + height + '" viewBox="0 0 ' + width + ' ' + height + '" role="img" aria-label="Bar chart of total calories per day">';
    svg += '<defs>' +
      '<linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">' +
        '<stop offset="0" stop-color="#43b582" /><stop offset="1" stop-color="#2f9e6e" />' +
      '</linearGradient>' +
      '<linearGradient id="todayGrad" x1="0" y1="0" x2="0" y2="1">' +
        '<stop offset="0" stop-color="#f88b74" /><stop offset="1" stop-color="#f2674f" />' +
      '</linearGradient>' +
      '</defs>';

    // Y axis gridlines/labels (0, half, max)
    var ticks = [0, maxVal / 2, maxVal];
    ticks.forEach(function (t) {
      var y = baseY - (maxVal ? (t / maxVal) * plotH : 0);
      svg += '<line class="axis-line" x1="' + padLeft + '" y1="' + y + '" x2="' + (width - padRight) + '" y2="' + y + '" />';
      svg += '<text class="axis-label" x="' + (padLeft - 10) + '" y="' + (y + 4) + '" style="text-anchor:end">' + Math.round(t) + '</text>';
    });

    dates.forEach(function (d, i) {
      var val = totals[d];
      var h = maxVal ? (val / maxVal) * plotH : 0;
      var x = padLeft + i * barSlot + (barSlot - barW) / 2;
      var y = baseY - h;
      var isToday = d === todayKey;
      var fill = isToday ? "url(#todayGrad)" : "url(#barGrad)";
      svg += '<path d="' + topRoundedRect(x, y, barW, h, 7) + '" fill="' + fill + '"><title>' + d + ": " + val + " cal</title></path>";
      svg += '<text class="bar-value" x="' + (x + barW / 2) + '" y="' + (y - 7) + '">' + val + '</text>';
      // X label: show MM-DD to keep compact; today gets emphasized + named.
      var lbl = isToday ? "Today" : d.slice(5);
      svg += '<text class="axis-label' + (isToday ? " today" : "") + '" x="' + (x + barW / 2) + '" y="' + (baseY + 18) + '">' + lbl + '</text>';
    });

    svg += '</svg>';
    chart.innerHTML = svg;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // Semantic chip colors so the table reads at a glance.
  var CATEGORY_TAG = { Breakfast: "tag-orange", Lunch: "tag-green", Dinner: "tag-purple", Beverage: "tag-teal", Snack: "tag-blue" };
  var SELF_TAG = { "Nasty": "tag-red", "Healthy": "tag-green", "Healthy but high calorie": "tag-amber", "Misc": "tag-slate" };

  function chip(value, cls) {
    return '<span class="tag ' + (cls || "") + '">' + escapeHtml(value) + "</span>";
  }
  // A chip cell, or an em-dash when the optional value is blank.
  function chipCell(value, cls) {
    return value ? "<td>" + chip(value, cls) + "</td>" : '<td class="muted-cell">—</td>';
  }

  function renderTable() {
    var wrap = document.getElementById("table-wrap");
    if (entries.length === 0) {
      wrap.innerHTML = '<div class="empty">No entries yet.</div>';
      return;
    }

    var sorted = sortedNewestFirst();

    var html = '<div class="table-scroll"><table><thead><tr>' +
      '<th>What</th><th>Category</th><th>Self assessment</th><th>Prep mode</th>' +
      '<th class="nowrap">Date</th><th>Time</th>' +
      '<th class="num nowrap">Cals</th><th>Actions</th>' +
      '</tr></thead><tbody>';

    sorted.forEach(function (en) {
      html += '<tr>' +
        '<td class="what">' + escapeHtml(en.what) + '</td>' +
        '<td>' + chip(en.category, CATEGORY_TAG[en.category]) + '</td>' +
        chipCell(en.selfAssessment, SELF_TAG[en.selfAssessment]) +
        chipCell(en.prepMode, "tag-slate") +
        '<td class="nowrap">' + escapeHtml(formatDateShort(en.date)) + '</td>' +
        '<td class="nowrap">' + escapeHtml(en.time) + '</td>' +
        '<td class="num">' + en.estimatedCalories + '</td>' +
        '<td class="table-actions">' +
          '<button class="icon-btn" data-edit="' + en.id + '">Edit</button>' +
          '<button class="icon-btn danger" data-delete="' + en.id + '">Delete</button>' +
        '</td>' +
      '</tr>';
    });

    html += '</tbody></table></div>';
    wrap.innerHTML = html;

    wrap.querySelectorAll("[data-edit]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var entry = entries.find(function (en) { return en.id === btn.getAttribute("data-edit"); });
        if (entry) loadEntryIntoForm(entry);
      });
    });
    wrap.querySelectorAll("[data-delete]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-delete");
        entries = entries.filter(function (en) { return en.id !== id; });
        if (editingId === id) resetForm();
        saveEntries();
        render();
      });
    });
  }

  // --- Init ---
  saveEntries(); // persist any one-time migration from loadEntries()
  resetForm();
  render();
})();
</script>
</body>
</html>
